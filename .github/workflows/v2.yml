name: Go

on:
  push:
    branches: [ master ]
    paths:
      - 'v2/**'
  pull_request:
    branches: [ master ]
    paths:
      - 'v2/**'

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2/
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23.x'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: v2/

  build:
    needs: golangci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2/
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23.x'

      - name: Test
        run: |
          make test
