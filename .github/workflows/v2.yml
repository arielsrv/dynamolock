name: Go

on:
  push:
    branches: [ master ]
    paths:
      - 'v2/**'
  pull_request:
    branches: [ master ]
    paths:
      - 'v2/**'

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'

      - name: Test
        working-directory: v2/
        run: |
          make test    
